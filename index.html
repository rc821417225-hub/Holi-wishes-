<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Realistic Holi Celebration 🌈</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&family=Pacifico&display=swap" rel="stylesheet">

<style>
body{
margin:0;
overflow:hidden;
font-family:'Poppins',sans-serif;
background:black;
color:white;
text-align:center;
}

/* INTRO */
#intro{
position:fixed;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
font-size:2em;
letter-spacing:4px;
animation:introFade 4s forwards;
z-index:10;
}

@keyframes introFade{
0%{opacity:1}
85%{opacity:1}
100%{opacity:0;visibility:hidden}
}

#main{
display:none;
padding-top:40px;
position:absolute;
width:100%;
z-index:5;
}

h1{
font-family:'Pacifico',cursive;
font-size:2.8em;
background:linear-gradient(45deg,#ff0,#0ff,#f0f,#0f0);
-webkit-background-clip:text;
color:transparent;
animation:glow 2s infinite alternate;
}

@keyframes glow{
from{text-shadow:0 0 10px #fff}
to{text-shadow:0 0 25px #ff0,0 0 40px #f0f}
}

.message{
margin:15px auto;
padding:15px;
width:85%;
max-width:500px;
background:rgba(0,0,0,0.5);
border-radius:20px;
font-size:18px;
line-height:1.6;
}

button{
padding:12px 25px;
font-size:18px;
border:none;
border-radius:25px;
background:#ff4081;
color:white;
cursor:pointer;
box-shadow:0 0 15px rgba(255,255,255,.6);
transition:.3s;
}
button:hover{transform:scale(1.1);}

canvas{
position:absolute;
top:0;
left:0;
z-index:1;
}
</style>
</head>

<body>

<div id="intro">🌈 Get Ready For Real Holi Experience 🎨</div>

<div id="main">
<h1>🌸 Happy Holi Shruti & Ankit 🌸</h1>

<div class="message">
May colors of joy, love and success splash into your life 💖  
Celebrate with happiness and positivity 🌟  
Let your dreams fly like vibrant gulaal 🌈  
</div>

<button onclick="startHoli()">🎁 Start Celebration</button>
</div>

<canvas id="canvas"></canvas>

<audio id="music" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/23/audio_8b1eaf6c1b.mp3?filename=indian-dhol-holi-112194.mp3" type="audio/mp3">
</audio>

<script>

const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];

function randomColor(){
return `hsl(${Math.random()*360},100%,60%)`;
}

function Particle(x,y){
this.x=x;
this.y=y;
this.size=Math.random()*8+4;
this.color=randomColor();
this.speedX=(Math.random()-0.5)*4;
this.speedY=(Math.random()-0.5)*4;
this.alpha=1;
}

Particle.prototype.update=function(){
this.x+=this.speedX;
this.y+=this.speedY;
this.alpha-=0.01;
}

Particle.prototype.draw=function(){
ctx.globalAlpha=this.alpha;
ctx.beginPath();
ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
ctx.fillStyle=this.color;
ctx.fill();
ctx.globalAlpha=1;
}

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);
particles.forEach((p,i)=>{
p.update();
p.draw();
if(p.alpha<=0) particles.splice(i,1);
});
requestAnimationFrame(animate);
}
animate();

function startHoli(){
document.getElementById("music").play();
}

/* REALISTIC PICHKARI EFFECT ON CLICK */
document.addEventListener("click",(e)=>{
for(let i=0;i<80;i++){
particles.push(new Particle(e.clientX,e.clientY));
}
});

/* COLOR POWDER RAIN */
setInterval(()=>{
for(let i=0;i<5;i++){
particles.push(new Particle(Math.random()*canvas.width,0));
}
},200);

setTimeout(()=>{
document.getElementById("main").style.display="block";
},4000);

</script>

</body>
</html>
